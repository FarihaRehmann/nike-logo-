<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nike React</title>

  <!-- CSS file ka link -->
  <link rel="stylesheet" href="style.css" />

</head>
<body>

  <!-- HEADER -->
  <header>

    <div class="logo">
      <!-- apna nike logo image yahan daalna -->
      <img src="./images/nike logo.jpeg" alt="Nike Logo" />
      <p class="logo-text"><span>NIKE</span> REACT</p>
    </div>

    <nav>
      <a href="#" class="active">Home</a>
      <a href="#">Product</a>
      <a href="#">About us</a>
      <a href="#">Contact us</a>
    </nav>
  </header>


  <!-- HERO SECTION -->
  <section class="hero">

    <!-- LEFT: Shoe Image (dots, circle, ring sab image mein hain) -->
    <div class="hero-left">
      <!-- apni shoe image yahan daalna -->
      <img src="./images/shoes.jpeg" alt="Nike React Shoe" />
    </div>

    <!-- RIGHT: Text -->
    <div class="hero-right">
      <h1>
        <span>NIKE REACT</span>
        INFINITY RUN 2
      </h1>

      <p>
        The Nike React Infinity Run 2 continues to help
        reduce injury and keep you running.
      </p>

      <button class="btn-buy">
        🛒 BUY NOW
      </button>
    </div>

  </section>

</body>
</html>
